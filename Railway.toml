[railway]
  builder = "dockerfile"
  language = "java"

[build]
  dockerfilePath = "Dockerfile"

[deploy]
  numReplicas = 1
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
  healthcheckPath = "/"
  healthcheckPort = 8080

[environment]
  # JVM flags
  JAVA_OPTS = "-Xmx512m -Xms256m"
  # Railway will auto-inject DATABASE_URL from the PostgreSQL plugin
  # Also expose individual vars for local dev
  DB_HOST = "${DB_HOST}"
  DB_PORT = "${DB_PORT}"
  DB_NAME = "${DB_NAME}"
  DB_USER = "${DB_USER}"
  DB_PASSWORD = "${DB_PASSWORD}"
  GEMINI_API_KEY = "${GEMINI_API_KEY}"
